<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rt-sketch viewer</title>
    <link rel="stylesheet" href="/viewer.css">
</head>
<body>
    <header>
        <h1>rt-sketch viewer</h1>
        <div id="controls" class="controls hidden">
            <button id="btn-toggle" title="Start/Pause All">&#9654;</button>
            <button id="btn-reset" title="Reset All">&#8634;</button>
            <button id="btn-export" title="Save All">Save</button>
        </div>
        <span id="total-lines" class="total-lines"></span>
        <span id="status" class="status disconnected">disconnected</span>
    </header>
    <main id="grid"></main>
    <script src="/viewer.js"></script>
</body>
</html>
