<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rt-sketch</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>rt-sketch</h1>
        <div id="stats">
            <span class="stat"><label>iter</label><strong id="stat-iteration">0</strong></span>
            <span class="stat" id="stat-stamps-wrap" style="display:none"><label>stamps</label><strong id="stat-stamps">0</strong></span>
            <span class="stat"><label>lines</label><strong id="stat-lines">0</strong></span>
            <span class="stat"><label>last</label><span class="stat-val"><span class="stat-bar"><span class="stat-bar-fill" id="stat-last-bar"></span></span> <strong id="stat-last-len">-</strong> cm</span></span>
            <span class="stat"><label>MSE</label><strong id="stat-score">-</strong></span>
            <span class="stat"><label>FPS</label><strong id="stat-fps">-</strong></span>
            <span class="stat"><label>total</label><span class="stat-val"><strong id="stat-total">0</strong> cm</span></span>
        </div>
        <button id="btn-export">Export</button>
    </header>
    <main>
        <div class="panel">
            <div class="panel-header">
                <h2>target (processing res)</h2>
                <label class="size-label">size <input type="range" id="slider-target-size" min="10" max="100" step="5" value="50"> <span id="val-target-size">50</span>%</label>
            </div>
            <div class="target-controls">
                <label>γ <input type="range" id="slider-gamma" min="0.1" max="5.0" step="0.1" value="1.0"> <span id="val-gamma">1.0</span></label>
                <label>EV <input type="range" id="slider-exposure" min="-2.0" max="2.0" step="0.1" value="0.0"> <span id="val-exposure">0.0</span></label>
                <label>contrast <input type="range" id="slider-contrast" min="0.1" max="10.0" step="0.1" value="1.0"> <span id="val-contrast">1.0</span></label>
            </div>
            <div class="target-img-wrapper">
                <div class="placeholder" id="target-placeholder">waiting for source...</div>
                <img id="target-img" alt="target frame" style="display:none">
            </div>
        </div>
        <div class="panel-row">
            <div class="panel">
                <div class="panel-header">
                    <h2>canvas (processing res)</h2>
                    <label class="bbox-toggle"><input type="checkbox" id="chk-bbox" checked> bbox</label>
                </div>
                <div class="canvas-img-wrapper">
                    <div class="placeholder" id="canvas-placeholder">press start to begin</div>
                    <img id="canvas-img" alt="canvas at processing resolution" style="display:none">
                    <div id="bbox-overlay"></div>
                </div>
            </div>
            <div class="panel preview-panel">
                <h2>canvas</h2>
                <div class="placeholder" id="preview-placeholder">press start to begin</div>
                <img id="preview-img" alt="canvas at full scale" style="display:none">
            </div>
        </div>
    </main>
    <footer>
        <div class="footer-buttons">
            <button id="btn-toggle">Start</button>
            <button id="btn-reset">Reset</button>
        </div>
        <div class="footer-row">
            <div class="radio-pair">
                <span class="radio-label">x</span>
                <div class="radio-group" id="radio-x-sampler">
                    <label class="active"><input type="radio" name="x-sampler" value="uniform" checked><span class="w">uniform</span><span class="s">--</span></label>
                    <label><input type="radio" name="x-sampler" value="center"><span class="w">center</span><span class="s">/\</span></label>
                    <label><input type="radio" name="x-sampler" value="edges"><span class="w">edges</span><span class="s">\/</span></label>
                    <label><input type="radio" name="x-sampler" value="low"><span class="w">left</span><span class="s">&lt;</span></label>
                    <label><input type="radio" name="x-sampler" value="high"><span class="w">right</span><span class="s">&gt;</span></label>
                </div>
            </div>
            <div class="radio-pair">
                <span class="radio-label">y</span>
                <div class="radio-group" id="radio-y-sampler">
                    <label class="active"><input type="radio" name="y-sampler" value="uniform" checked><span class="w">uniform</span><span class="s">--</span></label>
                    <label><input type="radio" name="y-sampler" value="center"><span class="w">center</span><span class="s">/\</span></label>
                    <label><input type="radio" name="y-sampler" value="edges"><span class="w">edges</span><span class="s">\/</span></label>
                    <label><input type="radio" name="y-sampler" value="low"><span class="w">top</span><span class="s">&lt;</span></label>
                    <label><input type="radio" name="y-sampler" value="high"><span class="w">bottom</span><span class="s">&gt;</span></label>
                </div>
            </div>
        </div>
        <div class="footer-row">
            <div class="radio-pair">
                <span class="radio-label">len</span>
                <div class="radio-group" id="radio-length-sampler">
                    <label class="active"><input type="radio" name="length-sampler" value="uniform" checked><span class="w">uniform</span><span class="s">--</span></label>
                    <label><input type="radio" name="length-sampler" value="center"><span class="w">center</span><span class="s">/\</span></label>
                    <label><input type="radio" name="length-sampler" value="edges"><span class="w">edges</span><span class="s">\/</span></label>
                    <label><input type="radio" name="length-sampler" value="low"><span class="w">short</span><span class="s">&lt;</span></label>
                    <label><input type="radio" name="length-sampler" value="high"><span class="w">long</span><span class="s">&gt;</span></label>
                </div>
            </div>
            <div class="slider-half">
                <label class="slider-label">min <input type="range" id="slider-min-len" min="0.1" max="15" step="0.1" value="0.2"> <span id="val-min-len">0.2</span></label>
                <label class="slider-label">max <input type="range" id="slider-max-len" min="0.1" max="15" step="0.1" value="5.0"> <span id="val-max-len">5.0</span></label>
            </div>
        </div>
        <div class="footer-row">
            <label class="slider-label">K <input type="range" id="slider-k" min="5" max="500" step="5" value="200"> <span id="val-k">200</span></label>
            <label class="slider-label">α <input type="range" id="slider-alpha" min="1.0" max="10.0" step="1" value="2.0"> <span id="val-alpha">2</span></label>
        </div>
    </footer>
    <script src="/app.js"></script>
</body>
</html>
